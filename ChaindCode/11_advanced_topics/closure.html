<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Closure</title>
</head>
<body style="background-color: #313131;">
    <button id="orange">Orange</button>

    <button id="green">Green</button>
</body>

<script>

    /* lexical scoping - means function ke andar agr function ko declare kiya hai toh inner function 

        outer waale ko access kr skta hai but sibling function access nhi karega variable wgera

    */

    function outer(){

        let username = 'Shiva'
        //console.log(secret) - BUT YAHA PARENT CHILD FUNCTION KO NHI 

        // ab yaha pe child parent ko access kr skta hai 
        function inner_child_one(){
            let secret = '1223'

            console.log(username)
        }

        function inner_child_two(){
            console.log(username)
           // console.log(secret) - same sibling bhi access nhi kar skta apne sibling elements ko 
        }

        inner_child_one()
        inner_child_two()
    }
    outer()
    

    // REAL EXECUTION OF CLOSURE 
    function clickHandler(color){

        return function(){
            document.body.style.backgroundColor = `${color}`
        }
    }

    document.getElementById('orange').onclick = clickHandler('orange')
    
    document.getElementById('green').onclick = clickHandler('green')

</script>
</html>
