<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="first-head">
            BMI Calculator
        </h1>

        <form action="post" class="form">

            <label for="height">Enter height in cm: </label>
            <input type="number" name="height" id="height">
            <br><br>
            <label for="weight">Enter weight in kg: </label>
            <input type="number" name="weight" id="weight"> <br>
            <button class="button">Calculate</button>

        
        
        <div class="result">

        </div>

        <div class="weight-guide">
            <h3 class="guide-head">BMI Weight Guide</h3>

            <p>Under Weight = Less than 18.6</p>
            <p>Normal Range = 18.6 to 24.9</p>
            <p>Over Weight = Greater than 24.9</p>
        </div>
        </form>
    </div>


    <script src="script.js"></script>
</body>
</html>
